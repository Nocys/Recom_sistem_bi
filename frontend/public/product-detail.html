<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Produk - InteriorRec</title>
    <script>
      window.tailwind = window.tailwind || {};
      tailwind.config = { darkMode: 'class' };
      (function () {
        try {
          if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (error) {}
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/custom.css" />
  </head>
  <body data-page="product-detail" class="min-h-screen bg-stone-50 text-stone-900 dark:bg-stone-950 dark:text-stone-100">
    <header class="sticky top-0 z-40 border-b border-stone-200 bg-white/95 backdrop-blur dark:border-stone-800 dark:bg-stone-950/95">
      <nav class="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
        <a href="index.html" class="text-base font-semibold tracking-wide text-stone-950 dark:text-stone-100">InteriorRec</a>
        <div id="primary-nav" class="flex flex-wrap items-center gap-4 text-sm"></div>
        <button data-theme-toggle type="button" onclick="toggleTheme()" class="rounded-md border border-stone-300 bg-white px-3 py-2 text-sm font-medium text-stone-700 hover:bg-stone-100 dark:border-stone-700 dark:bg-stone-900 dark:text-stone-200 dark:hover:bg-stone-800">Dark</button>
        <div id="nav-auth" class="flex flex-wrap items-center gap-3"></div>
      </nav>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
      <a href="index.html" class="text-sm font-semibold text-stone-600 hover:text-stone-950 dark:text-stone-300 dark:hover:text-white">Kembali ke Home</a>

      <section id="detail-loading" class="mt-6 grid gap-8 lg:grid-cols-[1.05fr_0.95fr]">
        <div class="skeleton aspect-[4/3] rounded-lg"></div>
        <div>
          <div class="skeleton h-8 w-3/4 rounded"></div>
          <div class="mt-4 skeleton h-6 w-1/3 rounded"></div>
          <div class="mt-8 grid gap-3 sm:grid-cols-2">
            <div class="skeleton h-20 rounded-lg"></div>
            <div class="skeleton h-20 rounded-lg"></div>
            <div class="skeleton h-20 rounded-lg"></div>
            <div class="skeleton h-20 rounded-lg"></div>
          </div>
        </div>
      </section>

      <section id="product-detail" class="mt-6 hidden grid gap-8 lg:grid-cols-[1.05fr_0.95fr]">
        <div class="overflow-hidden rounded-lg border border-stone-200 bg-white shadow-sm dark:border-stone-800 dark:bg-stone-900">
          <img id="product-image" class="hidden aspect-[4/3] w-full object-cover" alt="" />
          <div id="product-image-fallback" class="hidden flex aspect-[4/3] items-center justify-center bg-stone-100 text-sm text-stone-500 dark:bg-stone-800 dark:text-stone-300">Interior Product</div>
        </div>

        <div>
          <p id="product-category" class="text-sm font-medium uppercase text-stone-600 dark:text-stone-300"></p>
          <h1 id="product-name" class="mt-2 text-3xl font-semibold leading-tight text-stone-900 dark:text-stone-100"></h1>
          <p id="product-price" class="mt-4 text-2xl font-semibold text-stone-900 dark:text-stone-100"></p>

          <div class="mt-6 grid gap-3 sm:grid-cols-2">
            <div class="rounded-lg border border-stone-200 bg-white p-4 dark:border-stone-800 dark:bg-stone-900">
              <p class="text-xs font-medium uppercase text-stone-500 dark:text-stone-400">Material</p>
              <p id="product-material" class="mt-2 text-sm font-semibold text-stone-900 dark:text-stone-100"></p>
            </div>
            <div class="rounded-lg border border-stone-200 bg-white p-4 dark:border-stone-800 dark:bg-stone-900">
              <p class="text-xs font-medium uppercase text-stone-500 dark:text-stone-400">Style / Theme</p>
              <p id="product-style" class="mt-2 text-sm font-semibold text-stone-900 dark:text-stone-100"></p>
            </div>
            <div class="rounded-lg border border-stone-200 bg-white p-4 dark:border-stone-800 dark:bg-stone-900">
              <p class="text-xs font-medium uppercase text-stone-500 dark:text-stone-400">Dominant Color</p>
              <p id="product-color" class="mt-2 text-sm font-semibold text-stone-900 dark:text-stone-100"></p>
            </div>
            <div class="rounded-lg border border-stone-200 bg-white p-4 dark:border-stone-800 dark:bg-stone-900">
              <p class="text-xs font-medium uppercase text-stone-500 dark:text-stone-400">Room Category</p>
              <p id="product-room" class="mt-2 text-sm font-semibold text-stone-900 dark:text-stone-100"></p>
            </div>
            <div class="rounded-lg border border-stone-200 bg-white p-4 dark:border-stone-800 dark:bg-stone-900 sm:col-span-2">
              <p class="text-xs font-medium uppercase text-stone-500 dark:text-stone-400">Stock</p>
              <p id="product-stock" class="mt-2 text-sm font-semibold text-stone-900 dark:text-stone-100"></p>
            </div>
          </div>

          <div class="mt-6 rounded-lg border border-stone-200 bg-white p-4 dark:border-stone-800 dark:bg-stone-900">
            <p class="text-xs font-medium uppercase text-stone-500 dark:text-stone-400">Description</p>
            <p id="product-description" class="mt-2 text-sm leading-6 text-stone-700 dark:text-stone-300"></p>
          </div>

          <div class="mt-6 grid gap-3 sm:grid-cols-3">
            <button id="like-button" type="button" class="inline-flex h-11 items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-medium text-stone-700 hover:bg-stone-100 disabled:cursor-not-allowed disabled:opacity-60 dark:border-stone-700 dark:bg-stone-900 dark:text-stone-200 dark:hover:bg-stone-800">Like</button>
            <button id="wishlist-button" type="button" class="inline-flex h-11 items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-medium text-stone-700 hover:bg-stone-100 disabled:cursor-not-allowed disabled:opacity-60 dark:border-stone-700 dark:bg-stone-900 dark:text-stone-200 dark:hover:bg-stone-800">Wishlist</button>
            <button id="whatsapp-button" type="button" class="inline-flex h-11 items-center justify-center gap-2 rounded-xl bg-green-600 px-4 text-sm font-medium text-white hover:bg-green-700 disabled:cursor-not-allowed disabled:opacity-60 dark:bg-green-700 dark:hover:bg-green-600">Tanya Admin</button>
          </div>

          <div id="interaction-login-prompt" class="mt-4 hidden rounded-lg border border-amber-200 bg-amber-50 p-4 text-sm text-amber-900 dark:border-amber-800 dark:bg-amber-950 dark:text-amber-100">
            <p>Silakan login untuk menyukai atau menyimpan produk ke wishlist.</p>
            <a href="login.html" class="mt-3 inline-flex h-9 items-center rounded-md bg-stone-900 px-4 text-sm font-semibold text-white hover:bg-stone-800 dark:bg-stone-100 dark:text-stone-900 dark:hover:bg-white">Login</a>
          </div>
        </div>
      </section>

      <section id="room-complementary-recommendations" class="mt-12"></section>
      <section id="product-detail-recommendations" class="mt-12"></section>
    </main>

    <footer class="mt-12 border-t border-stone-200 bg-white px-4 py-6 text-center text-sm text-stone-500 dark:border-stone-800 dark:bg-stone-950 dark:text-stone-400">
      &copy; 2026 Interior Recommendation System.
    </footer>

    <script src="../assets/js/ui.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/interactions.js"></script>
    <script src="../assets/js/recommendations.js"></script>
    <script src="../assets/js/products.js"></script>
  </body>
</html>
